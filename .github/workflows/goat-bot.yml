name: Goat Bot Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '30 11 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh data
        env:
          K: ${{ secrets.K }}
        run: node scripts/update-goat-bot.mjs

      - name: Commit data
        run: |
          git config user.name "goat-bot"
          git config user.email "goat-bot@users.noreply.github.com"
          git add goat/data/goat-bot.json
          git commit -m "Refresh Goat Bot data" || echo "No changes"
          git push
