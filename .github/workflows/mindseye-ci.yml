name: Mind's Eye Validation

on:
  push:
    paths:
      - 'The-Minds-Eye/**'
      - '.github/workflows/mindseye-ci.yml'
  pull_request:
    paths:
      - 'The-Minds-Eye/**'
      - '.github/workflows/mindseye-ci.yml'
  workflow_dispatch:

jobs:
  validate-mindseye:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Mind's Eye town package
        run: python The-Minds-Eye/scripts/validate_mindseye.py
