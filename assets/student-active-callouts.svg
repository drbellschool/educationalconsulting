<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
    <linearGradient id="dark" x1="0" x2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#7c2d12"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#111827" flood-opacity=".22"/></filter>
  </defs>
  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1330" cy="60" r="330" fill="#fed7aa" opacity=".65"/>
  <rect x="70" y="110" width="1060" height="720" rx="36" fill="url(#dark)" filter="url(#shadow)"/>
  <rect x="105" y="145" width="990" height="120" rx="22" fill="#111827" opacity=".75"/>
  <rect x="130" y="168" width="160" height="28" rx="14" fill="#ffb000"/><text x="150" y="187" font-family="Arial" font-size="14" font-weight="700" fill="#111827">HallPass Demo</text>
  <text x="130" y="232" font-family="Arial" font-size="40" font-weight="800" fill="white">Student Dashboard</text>
  <text x="132" y="258" font-family="Arial" font-size="18" fill="#e5e7eb">Status, pass timer, destination, quota, and recent activity.</text>
  <g transform="translate(725 160)">
    <rect width="110" height="76" rx="14" fill="white" opacity=".12" stroke="white" stroke-opacity=".16"/><text x="18" y="32" font-family="Arial" font-size="28" font-weight="800" fill="white">1/26</text><text x="18" y="55" font-family="Arial" font-size="13" fill="#e5e7eb">active passes</text>
  </g>
  <g transform="translate(850 160)"><rect width="110" height="76" rx="14" fill="white" opacity=".12" stroke="white" stroke-opacity=".16"/><text x="18" y="32" font-family="Arial" font-size="28" font-weight="800" fill="white">43m</text><text x="18" y="55" font-family="Arial" font-size="13" fill="#e5e7eb">left</text></g>
  <g transform="translate(975 160)"><rect width="110" height="76" rx="14" fill="white" opacity=".12" stroke="white" stroke-opacity=".16"/><text x="18" y="32" font-family="Arial" font-size="28" font-weight="800" fill="white">1/3</text><text x="18" y="55" font-family="Arial" font-size="13" fill="#e5e7eb">quota</text></g>
  <rect x="105" y="305" width="350" height="470" rx="24" fill="white"/>
  <circle cx="205" cy="420" r="58" fill="none" stroke="#22c55e" stroke-width="16"/><text x="178" y="429" font-family="Arial" font-size="27" font-weight="800" fill="#111827">100%</text>
  <text x="280" y="398" font-family="Arial" font-size="26" font-weight="800" fill="#111827">Clear to</text><text x="280" y="432" font-family="Arial" font-size="26" font-weight="800" fill="#111827">Request</text>
  <text x="280" y="468" font-family="Arial" font-size="15" fill="#4b5563">Score penalties and</text><text x="280" y="490" font-family="Arial" font-size="15" fill="#4b5563">restrictions appear here.</text>
  <rect x="130" y="560" width="300" height="105" rx="18" fill="#111827"/><text x="155" y="595" font-family="Arial" font-size="19" font-weight="800" fill="white">Weekly Restroom Quota</text><text x="360" y="595" font-family="Arial" font-size="24" font-weight="800" fill="#ffb000">1 / 3</text><rect x="155" y="620" width="250" height="12" rx="6" fill="#374151"/><rect x="155" y="620" width="85" height="12" rx="6" fill="#f97316"/>
  <rect x="485" y="305" width="610" height="470" rx="24" fill="white"/>
  <text x="515" y="345" font-family="Arial" font-size="24" font-weight="800" fill="#111827">Request a Pass</text>
  <rect x="525" y="385" width="530" height="160" rx="24" fill="#ecfdf5" stroke="#86efac"/><text x="752" y="423" font-family="Arial" font-size="15" fill="#4b5563">Current status</text><text x="700" y="488" font-family="Arial" font-size="62" font-weight="800" fill="#111827">00:11</text><text x="700" y="525" font-family="Arial" font-size="22" font-weight="800" fill="#111827">Restroom 1 - Female</text>
  <rect x="525" y="585" width="245" height="46" rx="12" fill="#f8fafc" stroke="#d1d5db"/><rect x="810" y="585" width="245" height="46" rx="12" fill="#f8fafc" stroke="#d1d5db"/><rect x="525" y="650" width="245" height="46" rx="12" fill="#f8fafc" stroke="#d1d5db"/><rect x="810" y="650" width="245" height="46" rx="12" fill="#f8fafc" stroke="#d1d5db"/>
  <g filter="url(#shadow)"><rect x="1110" y="145" width="380" height="128" rx="24" fill="white"/><rect x="1130" y="166" width="50" height="8" rx="4" fill="#f97316"/><text x="1130" y="210" font-family="Arial" font-size="23" font-weight="800" fill="#111827">Student Status</text><text x="1130" y="242" font-family="Arial" font-size="17" fill="#4b5563">Students can instantly see whether they</text><text x="1130" y="266" font-family="Arial" font-size="17" fill="#4b5563">are clear to request a pass.</text></g>
  <g filter="url(#shadow)"><rect x="1070" y="420" width="430" height="140" rx="24" fill="white"/><rect x="1090" y="441" width="50" height="8" rx="4" fill="#f97316"/><text x="1090" y="485" font-family="Arial" font-size="23" font-weight="800" fill="#111827">Live Pass Timer</text><text x="1090" y="517" font-family="Arial" font-size="17" fill="#4b5563">Once approved, the active pass timer</text><text x="1090" y="541" font-family="Arial" font-size="17" fill="#4b5563">starts and the destination stays visible.</text></g>
  <g filter="url(#shadow)"><rect x="130" y="820" width="460" height="110" rx="24" fill="white"/><rect x="152" y="840" width="50" height="8" rx="4" fill="#f97316"/><text x="152" y="882" font-family="Arial" font-size="23" font-weight="800" fill="#111827">Quota &amp; Restrictions</text><text x="152" y="912" font-family="Arial" font-size="17" fill="#4b5563">Weekly restroom quota, points, and restrictions are shown before the request.</text></g>
</svg>