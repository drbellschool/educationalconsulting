<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#fff"/></linearGradient><linearGradient id="dark" x1="0" x2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#7c2d12"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#111827" flood-opacity=".22"/></filter></defs>
<rect width="1600" height="980" fill="url(#bg)"/><circle cx="1340" cy="80" r="330" fill="#fed7aa" opacity=".55"/>
<rect x="80" y="110" width="1050" height="720" rx="36" fill="url(#dark)" filter="url(#shadow)"/>
<rect x="120" y="150" width="970" height="110" rx="24" fill="#111827" opacity=".78"/><rect x="145" y="172" width="175" height="28" rx="14" fill="#ffb000"/><text x="164" y="191" font-family="Arial" font-size="14" font-weight="700">HallPass Demo</text><text x="145" y="236" font-family="Arial" font-size="40" font-weight="800" fill="white">Teacher Dashboard</text><text x="148" y="260" font-family="Arial" font-size="17" fill="#e5e7eb">Teacher approval, quick pass, PIN, and room controls.</text>
<g transform="translate(735 164)"><rect width="105" height="74" rx="14" fill="white" opacity=".12"/><text x="20" y="32" font-family="Arial" font-size="28" font-weight="800" fill="white">0</text><text x="20" y="56" font-family="Arial" font-size="13" fill="#e5e7eb">pending</text></g><g transform="translate(855 164)"><rect width="105" height="74" rx="14" fill="white" opacity=".12"/><text x="20" y="32" font-family="Arial" font-size="28" font-weight="800" fill="white">0</text><text x="20" y="56" font-family="Arial" font-size="13" fill="#e5e7eb">active</text></g><g transform="translate(975 164)"><rect width="105" height="74" rx="14" fill="white" opacity=".12"/><text x="20" y="32" font-family="Arial" font-size="28" font-weight="800" fill="white">30s</text><text x="20" y="56" font-family="Arial" font-size="13" fill="#e5e7eb">refresh</text></g>
<rect x="120" y="295" width="460" height="90" rx="20" fill="white"/><text x="145" y="335" font-family="Arial" font-size="25" font-weight="800" fill="#111827">Pending Requests</text><text x="145" y="362" font-family="Arial" font-size="16" fill="#4b5563">Nothing here right now.</text><rect x="610" y="295" width="480" height="90" rx="20" fill="white"/><text x="635" y="335" font-family="Arial" font-size="25" font-weight="800" fill="#111827">Active Passes</text><text x="635" y="362" font-family="Arial" font-size="16" fill="#4b5563">Nothing here right now.</text>
<rect x="120" y="415" width="970" height="260" rx="22" fill="white"/><text x="145" y="458" font-family="Arial" font-size="27" font-weight="800" fill="#111827">Quick Student Pass</text><text x="145" y="492" font-family="Arial" font-size="16" fill="#4b5563">Use this when a student forgot their device or cannot submit their own pass.</text><text x="145" y="535" font-family="Arial" font-size="15" font-weight="700">Student ID</text><rect x="145" y="552" width="430" height="48" rx="12" fill="#f8fafc" stroke="#d1d5db"/><text x="610" y="535" font-family="Arial" font-size="15" font-weight="700">Reason</text><rect x="610" y="552" width="430" height="48" rx="12" fill="#f8fafc" stroke="#d1d5db"/><text x="145" y="635" font-family="Arial" font-size="15" font-weight="700">Destination</text><rect x="145" y="652" width="430" height="48" rx="12" fill="#f8fafc" stroke="#d1d5db"/><rect x="610" y="635" width="22" height="22" rx="4" fill="#fff" stroke="#9ca3af"/><text x="645" y="653" font-family="Arial" font-size="15" fill="#111827">Count as student penalty</text><rect x="145" y="720" width="160" height="58" rx="14" fill="#f97316"/><text x="170" y="756" font-family="Arial" font-size="17" font-weight="800" fill="#111827">Generate Pass</text>
<rect x="120" y="700" width="970" height="86" rx="22" fill="white"/><text x="145" y="754" font-family="Arial" font-size="26" font-weight="800" fill="#111827">Teacher Account Settings</text>
<g filter="url(#shadow)"><rect x="1110" y="145" width="390" height="128" rx="24" fill="white"/><rect x="1130" y="166" width="50" height="8" rx="4" fill="#f97316"/><text x="1130" y="210" font-family="Arial" font-size="23" font-weight="800" fill="#111827">Quick Student Pass</text><text x="1130" y="242" font-family="Arial" font-size="17" fill="#4b5563">Teachers can create a pass when</text><text x="1130" y="266" font-family="Arial" font-size="17" fill="#4b5563">students forget a device.</text></g>
<g filter="url(#shadow)"><rect x="1085" y="420" width="420" height="128" rx="24" fill="white"/><rect x="1105" y="441" width="50" height="8" rx="4" fill="#f97316"/><text x="1105" y="485" font-family="Arial" font-size="23" font-weight="800" fill="#111827">Reason + Destination</text><text x="1105" y="517" font-family="Arial" font-size="17" fill="#4b5563">Every pass can still be tied to a</text><text x="1105" y="541" font-family="Arial" font-size="17" fill="#4b5563">reason and destination.</text></g>
<g filter="url(#shadow)"><rect x="1010" y="690" width="470" height="125" rx="24" fill="white"/><rect x="1032" y="711" width="50" height="8" rx="4" fill="#f97316"/><text x="1032" y="753" font-family="Arial" font-size="23" font-weight="800" fill="#111827">Classroom Friendly</text><text x="1032" y="783" font-family="Arial" font-size="17" fill="#4b5563">Built for fast use without pulling teachers away from instruction.</text></g>
</svg>