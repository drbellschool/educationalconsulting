<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>NewEyes TikTok Teleprompter</title>
  <style>
    :root{--bg:#0b0b0f;--card:#fff;--ink:#111;--accent:#ff8a00;--muted:#aaa;--danger:#e74c3c;--good:#17c964}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0;font-family:Arial,sans-serif;background:var(--bg);color:#fff}
    header{padding:18px 16px 8px} h1{margin:0;font-size:24px} h2{margin:0 0 8px}.muted{color:var(--muted);font-size:14px}
    .card{background:var(--card);color:var(--ink);border-radius:16px;padding:16px;margin:12px 16px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    button{border:0;border-radius:14px;padding:13px 16px;font-size:18px;font-weight:800;cursor:pointer;min-height:52px}button.primary{background:var(--accent);color:#111}button.danger{background:var(--danger);color:#fff}button.good{background:var(--good);color:#07150b}button.secondary{background:#f2f2f2;color:#111}.pill{display:inline-block;background:#eee;color:#111;padding:4px 8px;border-radius:999px;font-size:12px}#status{padding:0 16px 10px;color:#ddd}
    #recorder{position:fixed;inset:0;height:100dvh;width:100vw;background:#000;display:none;overflow-y:auto;z-index:100;-webkit-overflow-scrolling:touch}#recorder.active{display:block}
    #sourceVideo{display:none}#cameraCanvas{position:fixed;inset:0;width:100vw;height:100dvh;background:#000}
    #shade{position:fixed;inset:0;background:rgba(0,0,0,.34);pointer-events:none}#prompt{position:relative;z-index:110;margin-top:74px;margin-left:7vw;margin-right:7vw;padding-bottom:108vh;font-size:52px;line-height:1.45;white-space:pre-wrap;text-shadow:0 3px 12px #000}
    #controlbar{position:fixed;left:0;right:0;bottom:0;z-index:140;padding:8px;padding-bottom:calc(8px + env(safe-area-inset-bottom));background:rgba(0,0,0,.76);display:flex;gap:8px;flex-wrap:wrap;align-items:center}#recStatus{font-size:14px;font-weight:700;opacity:.95;min-width:100%}
    .wpmBox{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800}.wpmValue{font-size:24px;min-width:52px;text-align:center;color:#fff}input[type=range]{width:165px;height:34px}
    #takePreview{position:fixed;right:10px;top:88px;z-index:130;width:120px;max-width:32vw;display:none;border:2px solid #fff;background:#000}#downloadTake{display:none;background:#fff;color:#111;padding:13px 14px;border-radius:14px;font-weight:800;text-decoration:none;font-size:17px}
    #countdown{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.48);font-size:32vw;font-weight:900;text-shadow:0 4px 20px #000}
    #uploadFrame{display:none}.during,.after{display:none}.isRecording .before,.isRecording .after{display:none!important}.isRecording .during{display:inline-flex!important}.hasTake .before,.hasTake .during{display:none!important}.hasTake .after{display:inline-flex!important}.hasTake #downloadTake{display:inline-block!important}.isRecording #prompt{padding-bottom:122vh}
    @media(max-width:600px){button{font-size:17px;padding:12px 14px;min-height:50px}#prompt{font-size:50px;margin-top:64px}.wpmBox{min-width:100%}input[type=range]{width:58vw}.isRecording #controlbar{justify-content:center}.isRecording #recStatus{min-width:auto}.isRecording .wpmBox{display:none}.isRecording button{font-size:20px;padding:14px 22px}}
  </style>
</head>
<body>
  <header><h1>NewEyes TikTok Teleprompter</h1><div class="muted">Reads your Google Sheet pipeline and records locally on your phone.</div></header>
  <div id="status">Loading episodes from NewEyes Studio...</div><div class="row" style="padding:0 16px 10px"><button class="primary" onclick="loadEpisodes()">Refresh Episodes</button></div><main id="episodes"></main>
  <section id="recorder">
    <video id="sourceVideo" autoplay playsinline muted></video><canvas id="cameraCanvas" width="1080" height="1920"></canvas><div id="shade"></div><div id="countdown">3</div>
    <div id="prompt">Select an episode.</div><video id="takePreview" controls playsinline></video><iframe id="uploadFrame" name="uploadFrame"></iframe>
    <div id="controlbar">
      <span id="recStatus">Ready</span>
      <button class="secondary before after" onclick="closeRecorder()">Dock</button><button class="secondary before" onclick="startCamera()">Camera</button><button class="primary before" onclick="beginCountdownAndRecord()">Record</button><button class="danger during" onclick="stopRecording()">Stop</button><button class="secondary after" onclick="redoTake()">Redo</button><button class="good before" onclick="toggleScroll()">Scroll</button><button class="secondary before" onclick="resetScroll()">Reset</button>
      <div class="wpmBox before">WPM <span id="wpmValue" class="wpmValue">220</span><input id="wpm" type="range" min="80" max="400" step="5" value="220" oninput="updateWpmLabel()"></div>
      <div class="wpmBox before">Font <input id="font" type="range" min="28" max="84" step="2" value="52" oninput="setFont()"></div>
      <a id="downloadTake" class="after">Download</a><button class="primary after" onclick="uploadTakeToDrive()">Upload to Drive</button>
    </div>
  </section>
<script>
const NEWEYES_APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbxX0J_yqJaJedD0gixgKiPLBIMXS9frc3hP7UI9EKNedaCGg7ZJIgUa1SZv3-zKs3cG/exec';
let selectedEpisode=null,running=false,last=null,stream=null,recorder=null,chunks=[],currentTakeUrl=null,currentTakeFile=null,countdownTimer=null,drawLoop=null;
function jsonp(params){return new Promise((resolve,reject)=>{const callback='neweyes_cb_'+Math.random().toString(36).slice(2);window[callback]=data=>{delete window[callback];script.remove();resolve(data)};const url=new URL(NEWEYES_APPS_SCRIPT_URL);Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));url.searchParams.set('callback',callback);const script=document.createElement('script');script.src=url.toString();script.onerror=()=>reject(new Error('Could not reach the NewEyes Google pipeline. Make sure Apps Script was updated and redeployed.'));document.body.appendChild(script)})}
async function loadEpisodes(){document.getElementById('status').textContent='Loading episodes from NewEyes Studio...';try{const res=await jsonp({action:'listEpisodes'});if(!res.ok)throw new Error(res.error||'Unknown Google pipeline error.');const items=res.episodes||[];document.getElementById('status').textContent='Loaded '+items.length+' episodes.';document.getElementById('episodes').innerHTML=items.map(episodeCard).join('')||'<div class="card">No episodes found. Send one from the NewEyes GPT pipeline first.</div>'}catch(err){document.getElementById('status').textContent=err.message||String(err)}}
function episodeCard(ep){const id=escapeHtml(ep.EpisodeID||''),title=escapeHtml(ep.Title||'Untitled'),status=escapeHtml(ep.Status||''),summary=escapeHtml(ep.Summary||''),runtime=escapeHtml(ep.EstimatedRuntime||'');return `<div class="card"><h2>${title}</h2><p><span class="pill">${id}</span> <span class="pill">${status}</span> ${runtime?`<span class="pill">${runtime}</span>`:''}</p><p>${summary}</p><button class="primary" onclick="openRecorder('${escapeJs(ep.EpisodeID)}')">Start Recording</button></div>`}
async function openRecorder(episodeId){document.getElementById('recorder').classList.add('active');setUiMode('before');document.getElementById('recStatus').textContent='Loading '+episodeId+'...';document.getElementById('prompt').textContent='Loading script...';redoTake(false);try{const res=await jsonp({action:'getEpisodeScript',episode_id:episodeId});if(!res.ok)throw new Error(res.error||'Could not load script.');selectedEpisode=res.episode;document.getElementById('prompt').textContent=selectedEpisode.full_script||'No script found.';resetScroll();updateWpmLabel()}catch(err){document.getElementById('prompt').textContent=err.message||String(err)}}
function closeRecorder(){running=false;clearCountdown();if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}cancelAnimationFrame(drawLoop);document.getElementById('recorder').classList.remove('active')}
async function startCamera(){try{if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)throw new Error('Camera recording is not supported in this browser.');stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1080},height:{ideal:1920}},audio:true});const vid=document.getElementById('sourceVideo');vid.srcObject=stream;await vid.play();drawCamera();document.getElementById('recStatus').textContent='Camera ready · normal framing · '+getWpm()+' WPM'}catch(err){alert(err.message||String(err))}}
function drawCamera(){const canvas=document.getElementById('cameraCanvas'),ctx=canvas.getContext('2d'),vid=document.getElementById('sourceVideo');function draw(){const cw=canvas.width,ch=canvas.height,vw=vid.videoWidth||1080,vh=vid.videoHeight||1920;ctx.save();ctx.clearRect(0,0,cw,ch);ctx.fillStyle='#000';ctx.fillRect(0,0,cw,ch);ctx.translate(cw,0);ctx.scale(-1,1);const scale=Math.min(cw/vw,ch/vh),dw=vw*scale,dh=vh*scale,dx=(cw-dw)/2,dy=(ch-dh)/2;try{ctx.drawImage(vid,0,0,vw,vh,dx,dy,dw,dh)}catch(e){}ctx.restore();drawLoop=requestAnimationFrame(draw)}draw()}
async function beginCountdownAndRecord(){if(!stream){alert('Tap Camera first.');return}if(recorder&&recorder.state==='recording')return;redoTake(false);resetScroll();await countdown(3);startRecording();startScrolling()}
function countdown(seconds){return new Promise(resolve=>{clearCountdown();const el=document.getElementById('countdown');let remaining=seconds;el.style.display='flex';el.textContent=remaining;countdownTimer=setInterval(()=>{remaining-=1;if(remaining>0)el.textContent=remaining;else{clearCountdown();resolve()}},1000)})}
function clearCountdown(){if(countdownTimer)clearInterval(countdownTimer);countdownTimer=null;const el=document.getElementById('countdown');if(el)el.style.display='none'}
function startRecording(){if(!stream){alert('Tap Camera first.');return}chunks=[];setUiMode('recording');const canvas=document.getElementById('cameraCanvas');const canvasStream=canvas.captureStream(30);stream.getAudioTracks().forEach(t=>canvasStream.addTrack(t));let options={};if(window.MediaRecorder&&MediaRecorder.isTypeSupported('video/mp4'))options={mimeType:'video/mp4'};else if(window.MediaRecorder&&MediaRecorder.isTypeSupported('video/webm;codecs=vp9'))options={mimeType:'video/webm;codecs=vp9'};else if(window.MediaRecorder&&MediaRecorder.isTypeSupported('video/webm'))options={mimeType:'video/webm'};try{recorder=new MediaRecorder(canvasStream,options)}catch(err){alert('This browser opened the camera, but cannot record video with MediaRecorder.');setUiMode('before');return}recorder.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data)};recorder.onstop=saveTake;recorder.start();document.getElementById('recStatus').textContent='Recording'}
function stopRecording(){if(recorder&&recorder.state!=='inactive')recorder.stop();running=false}
function saveTake(){const type=recorder.mimeType||'video/webm',ext=type.includes('mp4')?'mp4':'webm',blob=new Blob(chunks,{type});currentTakeUrl=URL.createObjectURL(blob);currentTakeFile=new File([blob],(selectedEpisode?.episode_id||'neweyes')+'-take.'+ext,{type});const preview=document.getElementById('takePreview');preview.src=currentTakeUrl;preview.style.display='block';const a=document.getElementById('downloadTake');a.href=currentTakeUrl;a.download=currentTakeFile.name;a.textContent='Download';setUiMode('take');document.getElementById('recStatus').textContent='Take ready. Upload to Drive or Redo.'}
function redoTake(showMessage=true){if(recorder&&recorder.state==='recording')recorder.stop();chunks=[];currentTakeFile=null;if(currentTakeUrl){URL.revokeObjectURL(currentTakeUrl);currentTakeUrl=null}const preview=document.getElementById('takePreview');preview.pause();preview.removeAttribute('src');preview.load();preview.style.display='none';const a=document.getElementById('downloadTake');a.removeAttribute('href');resetScroll();setUiMode('before');if(showMessage)document.getElementById('recStatus').textContent='Old take deleted. Ready for redo · '+getWpm()+' WPM'}
function uploadTakeToDrive(){if(!currentTakeFile||!selectedEpisode){alert('Record a take first.');return}document.getElementById('recStatus').textContent='Preparing upload... keep this page open.';const reader=new FileReader();reader.onload=()=>{const form=document.createElement('form');form.method='POST';form.action=NEWEYES_APPS_SCRIPT_URL;form.target='uploadFrame';form.style.display='none';const fields={action:'uploadTake',episode_id:selectedEpisode.episode_id,filename:currentTakeFile.name,mime_type:currentTakeFile.type||'video/webm',data:reader.result};Object.entries(fields).forEach(([k,v])=>{const input=document.createElement('textarea');input.name=k;input.value=v;form.appendChild(input)});document.body.appendChild(form);document.getElementById('uploadFrame').onload=()=>{document.getElementById('recStatus').textContent='Upload sent to Drive. Check the episode folder, then Redo to clear phone copy.'};form.submit();setTimeout(()=>form.remove(),3000);document.getElementById('recStatus').textContent='Uploading to Drive...'};reader.onerror=()=>alert('Could not read take for upload.');reader.readAsDataURL(currentTakeFile)}
function toggleScroll(){running?stopScrolling():startScrolling()}function startScrolling(){running=true;last=null;requestAnimationFrame(tick)}function stopScrolling(){running=false}
function tick(ts){if(!running)return;if(last===null)last=ts;const delta=ts-last;last=ts;const el=document.getElementById('recorder'),maxScroll=Math.max(0,el.scrollHeight-el.clientHeight),seconds=Math.max(1,(getWordCount()/getWpm())*60),pps=maxScroll/seconds;el.scrollTop+=pps*(delta/1000);requestAnimationFrame(tick)}
function resetScroll(){running=false;const el=document.getElementById('recorder');if(el)el.scrollTop=0;window.scrollTo(0,0)}
function setUiMode(mode){const r=document.getElementById('recorder');r.classList.toggle('isRecording',mode==='recording');r.classList.toggle('hasTake',mode==='take')}
function getWpm(){return Number(document.getElementById('wpm').value||220)}function getWordCount(){const text=document.getElementById('prompt').textContent||'';return Math.max(1,text.trim().split(/\s+/).filter(Boolean).length)}function updateWpmLabel(){document.getElementById('wpmValue').textContent=getWpm();const ep=selectedEpisode?selectedEpisode.episode_id+' — '+selectedEpisode.title+' · ':'';document.getElementById('recStatus').textContent=ep+getWpm()+' WPM'}
function setFont(){document.getElementById('prompt').style.fontSize=document.getElementById('font').value+'px'}function escapeHtml(str){return String(str??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function escapeJs(str){return String(str??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
loadEpisodes();
</script>
</body>
</html>
